name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        run: go build ./...
      - name: Test
        run: go test -race ./...
      - name: Vet
        run: go vet ./...

      # Self-dogfood: run timebombs against its own repo. Excludes are
      # required because docs, fixtures, and parser tests embed example
      # TIMEBOMB() annotations inside markdown / raw-string literals that
      # the language-agnostic scanner would otherwise flag.
      - name: Self-scan
        run: |
          go build -o bin/timebombs ./cmd/timebombs
          ./bin/timebombs scan . \
            --max-exploded 0 \
            --exclude '**/*.md' \
            --exclude 'testdata/**' \
            --exclude '**/*_test.go'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # install-mode goinstall builds golangci-lint with the same Go
      # toolchain selected above, avoiding the "go directive higher than
      # golangci-lint build version" error.
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.2
          install-mode: goinstall
